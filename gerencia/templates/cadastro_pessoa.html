{% extends "gerencia/base.html" %}

{% block title %}Cadastro de pessoas{% endblock %}

{% block content %}
<h1 class="h3 text-center mb-3">{% if pessoa.id %}Editar{% else %}Cadastrar{% endif %} pessoa</h1>

<form method="post" action="{% if pessoa.id %}{% url 'editar_pessoa' pessoa.id %}{% else %}{% url 'cadastro_pessoa' %}{% endif %}">
    {% csrf_token %}
    <table class="content w-50" align="center">
        <tr>
            <th><label for="nome_completo">Nome completo *</label></th>
            <td><input type="text" id="nome_completo" name="nome_completo" required value="{{ pessoa.nome_completo|default_if_none:'' }}"></td>
        </tr>
        <tr>
            <th><label for="cpf">CPF *</label></th>
            <td><input type="text" id="cpf" name="cpf" maxlength="14" placeholder="000.000.000-00" required value="{{ pessoa.cpf|default_if_none:'' }}"></td>
        </tr>
        <tr>
            <th><label for="numero">Numero *</label></th>
            <td><input type="text" id="numero" name="numero" placeholder="(00) 00000-0000" required value="{{ pessoa.numero|default_if_none:'' }}"></td>
        </tr>
        <tr>
            <th><label for="email">Email</label></th>
            <td><input type="email" id="email" name="email" value="{{ pessoa.email|default_if_none:'' }}"></td>
        </tr>
        <tr>
            <th><label for="data_nascimento">Data de nascimento</label></th>
            <td><input type="date" id="data_nascimento" name="data_nascimento" value="{{ pessoa.data_nascimento|date:'Y-m-d' }}"></td>
        </tr>
        <tr>
            <th><label for="cep">CEP</label></th>
            <td><input type="text" id="cep" name="cep" maxlength="9" placeholder="00000-000" value="{{ pessoa.cep|default_if_none:'' }}"></td>
        </tr>
        <tr>
            <th><label for="cidade">Cidade</label></th>
            <td><input type="text" id="cidade" name="cidade" value="{{ pessoa.cidade|default_if_none:'' }}"></td>
        </tr>
        <tr>
            <th><label for="estado">Estado</label></th>
            <td>
                <select name="estado" id="estado">
                    <option value="">Selecione</option>
                    {% for sigla, nome in estados %}
                        <option value="{{ sigla }}" {% if pessoa.estado == sigla %}selected{% endif %}>{{ nome }}</option>
                    {% endfor %}
                </select>
            </td>
        </tr>
        <tr>
            <th><label for="observacoes">Observacoes</label></th>
            <td><textarea name="observacoes" id="observacoes" rows="4">{{ pessoa.observacoes|default_if_none:'' }}</textarea></td>
        </tr>
    </table>
    <div class="text-center mt-3">
        <a href="{% url 'lista_pessoa' %}" class="btn btn-secondary">Cancelar</a>
        <button type="submit" class="btn btn-success">Salvar</button>
    </div>
</form>
{% endblock %}
