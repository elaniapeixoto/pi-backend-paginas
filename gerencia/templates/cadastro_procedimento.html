{% extends "gerencia/base.html" %}

{% block title %}Cadastro de procedimentos{% endblock %}

{% block content %}
<h1 class="h3 text-center mb-3">{% if procedimento %}Editar{% else %}Cadastrar{% endif %} procedimento</h1>

<form method="post" action="{% if procedimento %}{% url 'editar_procedimento' procedimento.id %}{% else %}{% url 'cadastro_procedimento' %}{% endif %}">
    {% csrf_token %}
    <table class="content w-50" align="center">
        <tr>
            <th><label for="procedimento">Procedimento *</label></th>
            <td><input type="text" id="procedimento" name="procedimento" required value="{{ procedimento.procedimento|default_if_none:'' }}"></td>
        </tr>
        <tr>
            <th><label for="valor">Valor *</label></th>
            <td><input type="number" step="0.01" min="0" id="valor" name="valor" required value="{{ procedimento.valor|default_if_none:'' }}"></td>
        </tr>
        <tr>
            <th><label for="tempo_medio">Tempo medio</label></th>
            <td><input type="time" id="tempo_medio" name="tempo_medio" value="{% if procedimento.tempo_medio %}{{ procedimento.tempo_medio }}{% endif %}"></td>
        </tr>
    </table>
    <div class="text-center mt-3">
        <a href="{% url 'lista_procedimentos' %}" class="btn btn-secondary">Cancelar</a>
        <button type="submit" class="btn btn-success">Salvar</button>
    </div>
</form>
{% endblock %}
