{% extends 'gerencia/base.html' %}

{% block title %}Cadastro de usuario{% endblock %}

{% block content %}
<h1 class="h3 text-center mb-3">Cadastrar usuario</h1>

<form method="post" action="{% url 'cadastro_usuario' %}">
    {% csrf_token %}
    <table class="content w-50" align="center">
        <tr>
            <th><label for="username">Nome de usuario *</label></th>
            <td><input type="text" id="username" name="username" required></td>
        </tr>
        <tr>
            <th><label for="password">Senha *</label></th>
            <td><input type="password" id="password" name="password" required></td>
        </tr>
        <tr>
            <th><label for="email">Email *</label></th>
            <td><input type="email" id="email" name="email" required></td>
        </tr>
        <tr>
            <th><label for="pessoa_id">Vincular a pessoa *</label></th>
            <td>
                <select id="pessoa_id" name="pessoa_id" required>
                    <option value="">Selecione uma pessoa</option>
                    {% for pessoa in pessoas %}
                        <option value="{{ pessoa.id }}">{{ pessoa.nome_completo }}</option>
                    {% endfor %}
                </select>
            </td>
        </tr>
    </table>
    <div class="text-center mt-3">
        <a href="{% url 'lista_usuario' %}" class="btn btn-secondary">Cancelar</a>
        <button type="submit" class="btn btn-success">Salvar</button>
    </div>
</form>
{% endblock %}
